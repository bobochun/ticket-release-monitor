# Copy this file to config/targets.yml for local use:
# cp config/targets.multi-platform.example.yml config/targets.yml
#
# Do not commit config/targets.yml if it contains private or personal monitoring URLs.
# This project only checks visible page text and sends notifications.
# It does not bypass CAPTCHA, queues, login, seat selection, checkout, or payment.

targets:
  - name: "FamiTicket / FamiLife - Guardians example"
    url: "https://guardians.fami.life/UTK0204_?PERFORMANCE_ID=P17ITAUR&PRODUCT_ID=P15UU08Q"
    enabled: true
    checkIntervalSeconds: 180
    timeoutMs: 45000
    keywords:
      - "立即購票"
      - "我要購票"
      - "可購買"
      - "熱區"
      - "剩餘"
      - "空位"
      - "加入購物車"
    negativeKeywords:
      - "已售完"
      - "銷售一空"
      - "暫無票券"
      - "目前無票券"
      - "尚未開賣"
      - "截止販售"
      - "已截止"
    note: "只通知，不自動登入、不自動購買。"

  - name: "中信兄弟售票 example"
