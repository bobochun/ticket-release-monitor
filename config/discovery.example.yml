# Copy this file to config/discovery.yml for local use:
# cp config/discovery.example.yml config/discovery.yml
#
# This discovers candidate public event links only.
# It does not login, bypass CAPTCHA, select seats, checkout, or pay.

rules:
  - name: "新莊富邦候選場次"
    enabled: true
    entryUrls:
      - "https://guardians.fami.life/"
    includeKeywords:
      - "新莊"
      - "富邦"
    optionalKeywords:
      - "中信"
      - "兄弟"
      - "熱區"
      - "A1"
      - "B1"
    excludeKeywords:
      - "已結束"
      - "售完"
      - "截止"
    dateKeywords:
      - "6/15"
      - "06/15"
      - "2026/06/15"
    maxCandidates: 20
    timeoutMs: 45000

  - name: "中信兄弟候選場次"
    enabled: true
    entryUrls:
      - "https://tix.ctbcsports.com/BROTHERS/"
    includeKeywords:
      - "兄弟"
    optionalKeywords:
      - "洲際"
      - "富邦"
      - "統一"
      - "樂天"
      - "味全"
      - "熱區"
    excludeKeywords:
      - "已結束"
      - "售完"
      - "截止"
    dateKeywords: []
    maxCandidates: 20
    timeoutMs: 45000

  - name: "KKTIX keyword discovery placeholder"
    enabled: false
    entryUrls:
      - "https://kktix.com/events"
    includeKeywords:
      - "演唱會"
    optionalKeywords:
      - "台北"
      - "高雄"
      - "加場"
    excludeKeywords:
      - "已結束"
      - "售完"
    dateKeywords: []
    maxCandidates: 20
    timeoutMs: 45000
