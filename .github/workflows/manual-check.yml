name: Ticket Radar Validation

on:
  workflow_dispatch:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Initialize local database
        run: npm run db:init
        env:
          CHECK_MODE: fetch

      - name: Seed examples
        run: npm run seed
        env:
          CHECK_MODE: fetch

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          CHECK_MODE: fetch
